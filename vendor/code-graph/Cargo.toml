[package]
name = "code-graph-daemon"
version = "0.1.0"
edition = "2021"

[dependencies]
# Tree-sitter core (locked to 0.24)
tree-sitter = "0.24"
streaming-iterator = "0.1"

# Language parsers (all must match tree-sitter core 0.24)
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"  # latest available
tree-sitter-javascript = "0.25"  # latest available
tree-sitter-typescript = "0.23"  # latest available (no 0.24)
tree-sitter-go = "0.25"  # latest available
tree-sitter-java = "0.23"  # latest available (no 0.24)
tree-sitter-c = "0.24"
tree-sitter-cpp = "0.23"  # latest available (no 0.24)
tree-sitter-html = "0.23"  # latest available (no 0.24)

# Async runtime
tokio = { version = "1", features = ["full"] }

# Lazy static
once_cell = "1"

# Synchronization
parking_lot = "0.12"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
async-trait = "0.1"

# File walking
ignore = "0.4"
dirs = "5"
