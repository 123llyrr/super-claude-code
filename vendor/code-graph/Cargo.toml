[package]
name = "code-graph-daemon"
version = "0.1.0"
edition = "2021"

[dependencies]
# Tree-sitter core (locked to 0.24)
tree-sitter = "0.24"

# Language parsers (version-locked per atomcode reference)
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"
tree-sitter-javascript = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-go = "0.25"
tree-sitter-java = "0.23"
tree-sitter-c = "0.24"
tree-sitter-cpp = "0.23"
tree-sitter-html = "0.23"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
async-trait = "0.1"

# File walking
ignore = "0.4"
dirs = "5"
