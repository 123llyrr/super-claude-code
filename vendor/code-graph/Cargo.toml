[package]
name = "code-graph-daemon"
version = "0.1.0"
edition = "2021"

[dependencies]
# Tree-sitter core — 0.25.0 required to match tree-sitter-rust 0.24.2's embedded parser
tree-sitter = "0.25.0"
streaming-iterator = "0.1"

# Language parsers — tree-sitter-rust 0.24.2 embeds version 15 parser (matches 0.25.0)
# tree-sitter-c 0.24.2 embeds version 14 (compatible with 0.25.0's range [13, 15])
# Other parsers use latest available; may have minor version mismatches but Rust is priority
tree-sitter-rust = "0.24.2"
tree-sitter-python = "0.25.0"
tree-sitter-javascript = "0.25.0"
tree-sitter-typescript = "0.23.2"
tree-sitter-go = "0.25.0"
tree-sitter-java = "0.23.5"
tree-sitter-c = "0.24.2"
tree-sitter-cpp = "0.23.4"
tree-sitter-html = "0.23.2"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Lazy static
once_cell = "1"

# Synchronization
parking_lot = "0.12"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
async-trait = "0.1"

# File walking
ignore = "0.4"
dirs = "5"
